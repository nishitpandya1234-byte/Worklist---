<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Tasks" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Mission Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0a0c; }
    body { font-family: 'DM Sans', sans-serif; color: #e8e8e8; overflow-x: hidden; }
    #root { height: 100%; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #2a2a30; border-radius: 2px; }

    .app { min-height: 100dvh; display: flex; flex-direction: column; background: #0a0a0c; padding-bottom: env(safe-area-inset-bottom); }

    .header { border-bottom: 1px solid #1e1e22; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: rgba(10,10,12,0.95); backdrop-filter: blur(12px); z-index: 100; padding-top: calc(16px + env(safe-area-inset-top)); }
    .logo { font-family: 'DM Mono', monospace; font-size: 11px; color: #444; letter-spacing: 0.14em; text-transform: uppercase; display: block; margin-bottom: 2px; }
    .header-title { font-size: 17px; font-weight: 600; color: #f0f0f0; letter-spacing: -0.02em; }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: #1a1a1e; border-bottom: 1px solid #1a1a1e; }
    .stat { padding: 14px 10px; background: #0e0e11; display: flex; flex-direction: column; gap: 3px; align-items: center; text-align: center; }
    .stat-val { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; line-height: 1; }
    .stat-label { font-size: 9px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; }

    .filters { padding: 12px 20px; display: flex; gap: 6px; border-bottom: 1px solid #1a1a1e; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn { font-family: 'DM Mono', monospace; font-size: 10px; padding: 6px 14px; border-radius: 20px; border: 1px solid #2a2a30; background: transparent; color: #666; cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
    .filter-btn.active { background: #1e1e26; border-color: #444; color: #e0e0e0; }

    .task-list { flex: 1; padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }
    .empty { text-align: center; padding: 80px 20px; color: #2a2a30; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.08em; }

    .task-card { display: flex; align-items: stretch; border: 1px solid #1a1a1e; border-radius: 10px; overflow: hidden; background: #0e0e11; transition: opacity 0.25s, transform 0.25s; -webkit-tap-highlight-color: transparent; }
    .task-card.done-card { opacity: 0.35; }
    .task-card.deleting { opacity: 0; transform: translateX(24px); }
    .priority-bar { width: 4px; flex-shrink: 0; }
    .task-body { flex: 1; padding: 13px 14px; display: flex; flex-direction: column; gap: 8px; min-width: 0; }
    .task-row1 { display: flex; align-items: flex-start; gap: 10px; }
    .check-btn { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid #333; background: transparent; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; margin-top: 1px; -webkit-tap-highlight-color: transparent; }
    .check-btn.checked { background: #30D158; border-color: #30D158; }
    .task-title { font-size: 14px; font-weight: 500; color: #e0e0e0; line-height: 1.35; flex: 1; }
    .task-title.done-text { text-decoration: line-through; color: #3a3a3a; }
    .task-row2 { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding-left: 32px; }
    .task-meta { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .meta-item { font-family: 'DM Mono', monospace; font-size: 10px; color: #3a3a3a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .priority-badge { font-family: 'DM Mono', monospace; font-size: 9px; padding: 2px 7px; border-radius: 4px; font-weight: 500; letter-spacing: 0.06em; flex-shrink: 0; }
    .countdown { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; flex-shrink: 0; }
    .countdown.overdue { color: #FF2D55; animation: pulse 2s ease-in-out infinite; }
    .countdown.urgent { color: #FF9500; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
    .delete-btn { background: none; border: none; color: #222; cursor: pointer; padding: 13px 14px; font-size: 14px; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; transition: color 0.15s; }

    .fab { position: fixed; bottom: calc(24px + env(safe-area-inset-bottom)); right: 20px; width: 56px; height: 56px; border-radius: 50%; background: #e8e8e8; color: #0a0a0c; border: none; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 24px rgba(0,0,0,0.6); z-index: 90; -webkit-tap-highlight-color: transparent; transition: transform 0.15s; }
    .fab:active { transform: scale(0.93); }

    .btn { font-family: 'DM Mono', monospace; font-size: 11px; padding: 9px 16px; border-radius: 6px; border: none; cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
    .btn-primary { background: #e8e8e8; color: #0a0a0c; }
    .btn-ghost { background: transparent; color: #666; border: 1px solid #2a2a30; }
    .btn-notif { background: transparent; border: 1px solid #FF9500; color: #FF9500; font-size: 10px; padding: 7px 12px; }
    .btn-notif.active { background: rgba(255,149,0,0.1); }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: flex-end; backdrop-filter: blur(6px); animation: fadeIn 0.18s ease; }
    @keyframes fadeIn { from{opacity:0}to{opacity:1} }
    .modal { background: #111115; border: 1px solid #2a2a30; border-radius: 16px 16px 0 0; padding: 24px 20px calc(24px + env(safe-area-inset-bottom)); width: 100%; animation: slideUp 0.22s ease; max-height: 92dvh; overflow-y: auto; }
    @keyframes slideUp { from{transform:translateY(100%)}to{transform:translateY(0)} }
    .modal-handle { width: 36px; height: 4px; background: #2a2a30; border-radius: 2px; margin: 0 auto 20px; }
    .modal-title { font-size: 16px; font-weight: 600; color: #f0f0f0; margin-bottom: 20px; letter-spacing: -0.02em; }
    .field { margin-bottom: 14px; }
    .label { font-family: 'DM Mono', monospace; font-size: 10px; color: #555; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; display: block; }
    .input { width: 100%; background: #0a0a0c; border: 1px solid #2a2a30; border-radius: 8px; padding: 12px 14px; color: #e0e0e0; font-family: 'DM Sans', sans-serif; font-size: 16px; outline: none; -webkit-appearance: none; }
    .input:focus { border-color: #444; }
    .priority-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .priority-opt { padding: 10px 4px; border-radius: 8px; border: 1.5px solid #2a2a30; background: transparent; cursor: pointer; text-align: center; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.04em; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
    .modal-actions .btn { flex: 1; padding: 13px; font-size: 12px; }

    .toasts { position: fixed; top: calc(80px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 300; width: calc(100% - 40px); max-width: 340px; pointer-events: none; }
    .toast { font-family: 'DM Mono', monospace; font-size: 11px; padding: 10px 16px; border-radius: 8px; border: 1px solid #2a2a30; background: rgba(17,17,21,0.97); color: #bbb; letter-spacing: 0.04em; animation: toastIn 0.2s ease; text-align: center; backdrop-filter: blur(8px); }
    .toast.success { border-color: #30D158; color: #30D158; }
    .toast.error { border-color: #FF2D55; color: #FF2D55; }
    @keyframes toastIn { from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const PRIORITIES = {
  critical: { label: "CRITICAL", color: "#FF2D55", bg: "rgba(255,45,85,0.12)", rank: 0 },
  high:     { label: "HIGH",     color: "#FF9500", bg: "rgba(255,149,0,0.12)",  rank: 1 },
  medium:   { label: "MEDIUM",   color: "#FFD60A", bg: "rgba(255,214,10,0.12)", rank: 2 },
  low:      { label: "LOW",      color: "#30D158", bg: "rgba(48,209,88,0.12)",  rank: 3 },
};

function getUrgencyScore(task) {
  const hoursLeft = (new Date(task.deadline).getTime() - Date.now()) / 3600000;
  const priorityBonus = (3 - PRIORITIES[task.priority].rank) * 48;
  return hoursLeft - priorityBonus;
}

function formatCountdown(deadline) {
  const diff = new Date(deadline).getTime() - Date.now();
  if (diff < 0) return { text: "OVERDUE", overdue: true };
  const h = Math.floor(diff / 3600000);
  const d = Math.floor(h / 24);
  if (d > 0) return { text: `${d}d ${h % 24}h`, overdue: false };
  if (h > 0) return { text: `${h}h ${Math.floor((diff % 3600000) / 60000)}m`, overdue: false };
  return { text: `${Math.floor(diff / 60000)}m`, overdue: false, urgent: true };
}

function formatDate(d) {
  return new Date(d).toLocaleDateString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
}

const DEFAULT_TASKS = [
  { id: 1, title: "Review Q1 product roadmap", assignedBy: "Sarah K.", deadline: new Date(Date.now() + 2 * 3600000).toISOString().slice(0,16), priority: "critical", done: false },
  { id: 2, title: "Finalize design mockups", assignedBy: "Marco D.", deadline: new Date(Date.now() + 26 * 3600000).toISOString().slice(0,16), priority: "high", done: false },
  { id: 3, title: "Update API documentation", assignedBy: "Priya N.", deadline: new Date(Date.now() + 72 * 3600000).toISOString().slice(0,16), priority: "medium", done: false },
  { id: 4, title: "Reply to investor memo", assignedBy: "Chris W.", deadline: new Date(Date.now() - 1 * 3600000).toISOString().slice(0,16), priority: "high", done: false },
];

function App() {
  const [tasks, setTasks] = useState(() => {
    try { const s = localStorage.getItem("mc_tasks"); return s ? JSON.parse(s) : DEFAULT_TASKS; } catch { return DEFAULT_TASKS; }
  });
  const [showForm, setShowForm] = useState(false);
  const [filter, setFilter] = useState("all");
  const [notifGranted, setNotifGranted] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [form, setForm] = useState({ title: "", assignedBy: "", deadline: "", priority: "high" });
  const [deletingId, setDeletingId] = useState(null);
  const [, setTick] = useState(0);

  useEffect(() => {
    try { localStorage.setItem("mc_tasks", JSON.stringify(tasks)); } catch {}
  }, [tasks]);

  useEffect(() => {
    if ("Notification" in window && Notification.permission === "granted") setNotifGranted(true);
  }, []);

  useEffect(() => {
    const iv = setInterval(() => setTick(t => t + 1), 30000);
    return () => clearInterval(iv);
  }, []);

  useEffect(() => {
    if (!notifGranted) return;
    const check = () => {
      tasks.filter(t => !t.done).forEach(t => {
        const hoursLeft = (new Date(t.deadline).getTime() - Date.now()) / 3600000;
        if (hoursLeft > 0 && hoursLeft <= 1) {
          const key = `notif_${t.id}`;
          if (!sessionStorage.getItem(key)) {
            new Notification("⏰ Deadline in < 1 hour", { body: t.title });
            sessionStorage.setItem(key, "1");
          }
        }
      });
    };
    check();
    const iv = setInterval(check, 60000);
    return () => clearInterval(iv);
  }, [tasks, notifGranted]);

  const addToast = useCallback((msg, type = "info") => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3500);
  }, []);

  const requestNotif = async () => {
    if (!("Notification" in window)) { addToast("Notifications not supported on this browser.", "error"); return; }
    const perm = await Notification.requestPermission();
    if (perm === "granted") { setNotifGranted(true); addToast("Reminders enabled!", "success"); }
    else addToast("Permission denied. Enable in browser settings.", "error");
  };

  const sortedTasks = [...tasks]
    .filter(t => filter === "all" ? true : filter === "done" ? t.done : !t.done)
    .sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      return getUrgencyScore(a) - getUrgencyScore(b);
    });

  const addTask = () => {
    if (!form.title.trim() || !form.deadline) { addToast("Title and deadline required.", "error"); return; }
    setTasks(p => [...p, { id: Date.now(), ...form, done: false }]);
    setForm({ title: "", assignedBy: "", deadline: "", priority: "high" });
    setShowForm(false);
    addToast("Task added!", "success");
  };

  const toggleDone = (id) => setTasks(p => p.map(t => t.id === id ? { ...t, done: !t.done } : t));

  const deleteTask = async (id) => {
    setDeletingId(id);
    await new Promise(r => setTimeout(r, 280));
    setTasks(p => p.filter(t => t.id !== id));
    setDeletingId(null);
  };

  const pending = tasks.filter(t => !t.done).length;
  const overdue = tasks.filter(t => !t.done && new Date(t.deadline) < new Date()).length;
  const critical = tasks.filter(t => !t.done && t.priority === "critical").length;
  const done = tasks.filter(t => t.done).length;

  return (
    <div className="app">
      <div className="header">
        <div>
          <span className="logo">Mission Control</span>
          <span className="header-title">Your Tasks</span>
        </div>
        <button className={`btn btn-notif ${notifGranted ? "active" : ""}`} onClick={notifGranted ? null : requestNotif}>
          {notifGranted ? "⏰ On" : "⏰ Reminders"}
        </button>
      </div>

      <div className="stats">
        <div className="stat"><span className="stat-val" style={{color:"#e8e8e8"}}>{pending}</span><span className="stat-label">Pending</span></div>
        <div className="stat"><span className="stat-val" style={{color: overdue > 0 ? "#FF2D55" : "#333"}}>{overdue}</span><span className="stat-label">Overdue</span></div>
        <div className="stat"><span className="stat-val" style={{color: critical > 0 ? "#FF2D55" : "#333"}}>{critical}</span><span className="stat-label">Critical</span></div>
        <div className="stat"><span className="stat-val" style={{color:"#30D158"}}>{done}</span><span className="stat-label">Done</span></div>
      </div>

      <div className="filters">
        {["all","pending","done"].map(f => (
          <button key={f} className={`filter-btn ${filter===f?"active":""}`} onClick={() => setFilter(f)}>{f}</button>
        ))}
      </div>

      <div className="task-list">
        {sortedTasks.length === 0 && <div className="empty">no tasks here 🎯</div>}
        {sortedTasks.map(task => {
          const p = PRIORITIES[task.priority];
          const cd = formatCountdown(task.deadline);
          return (
            <div key={task.id} className={`task-card ${task.done?"done-card":""} ${deletingId===task.id?"deleting":""}`}>
              <div className="priority-bar" style={{background: task.done ? "#1e1e22" : p.color}} />
              <div className="task-body">
                <div className="task-row1">
                  <button className={`check-btn ${task.done?"checked":""}`} onClick={() => toggleDone(task.id)}>
                    {task.done && <span style={{color:"#0a0a0c",fontSize:12,fontWeight:700,lineHeight:1}}>✓</span>}
                  </button>
                  <span className={`task-title ${task.done?"done-text":""}`}>{task.title}</span>
                </div>
                <div className="task-row2">
                  <div className="task-meta">
                    {task.assignedBy && <span className="meta-item">👤 {task.assignedBy}</span>}
                    <span className="meta-item">📅 {formatDate(task.deadline)}</span>
                  </div>
                  <span className="priority-badge" style={{color:p.color,background:p.bg}}>{p.label}</span>
                  {!task.done && (
                    <span className={`countdown ${cd.overdue?"overdue":cd.urgent?"urgent":""}`} style={!cd.overdue&&!cd.urgent?{color:"#3a3a3a"}:{}}>
                      {cd.text}
                    </span>
                  )}
                </div>
              </div>
              <button className="delete-btn" onClick={() => deleteTask(task.id)}>✕</button>
            </div>
          );
        })}
      </div>

      <button className="fab" onClick={() => setShowForm(true)}>+</button>

      {showForm && (
        <div className="overlay" onClick={e => e.target===e.currentTarget && setShowForm(false)}>
          <div className="modal">
            <div className="modal-handle" />
            <div className="modal-title">New Task</div>
            <div className="field">
              <label className="label">Title *</label>
              <input className="input" placeholder="What needs to be done?" value={form.title} onChange={e => setForm(p=>({...p,title:e.target.value}))} />
            </div>
            <div className="field">
              <label className="label">Assigned by</label>
              <input className="input" placeholder="Team member name" value={form.assignedBy} onChange={e => setForm(p=>({...p,assignedBy:e.target.value}))} />
            </div>
            <div className="field">
              <label className="label">Deadline *</label>
              <input className="input" type="datetime-local" value={form.deadline} onChange={e => setForm(p=>({...p,deadline:e.target.value}))} />
            </div>
            <div className="field">
              <label className="label">Priority</label>
              <div className="priority-grid">
                {Object.entries(PRIORITIES).map(([key,val]) => (
                  <button key={key} className="priority-opt"
                    style={{borderColor: form.priority===key?val.color:"#2a2a30", color: form.priority===key?val.color:"#444", background: form.priority===key?val.bg:"transparent"}}
                    onClick={() => setForm(p=>({...p,priority:key}))}>
                    {val.label}
                  </button>
                ))}
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={() => setShowForm(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={addTask}>Add Task</button>
            </div>
          </div>
        </div>
      )}

      <div className="toasts">
        {toasts.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
